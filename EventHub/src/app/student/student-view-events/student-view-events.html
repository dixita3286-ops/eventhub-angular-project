<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Parisienne&display=swap" rel="stylesheet">

<div class="main">

  <h1>Crafting Experiences, Not Just Events.</h1>

  <!-- ================= FILTERS ================= -->
  <div class="filters">

    <input
      type="text"
      placeholder="Search events..."
      (keyup)="onSearchChange($any($event.target).value)"
    >

    <select [(ngModel)]="category" (change)="loadEvents()">
      <option value="">All Categories</option>
      <option value="Workshop">Workshop</option>
      <option value="Seminar">Seminar</option>
      <option value="Cultural">Cultural</option>
      <option value="Sports">Sports</option>
      <option value="Social">Social</option>
      <option value="Exhibition">Exhibition</option>
    </select>

    <select [(ngModel)]="sort" (change)="loadEvents()">
      <option value="desc">Newest</option>
      <option value="asc">Oldest</option>
    </select>

  </div>

  <!-- ================= EVENTS GRID ================= -->
  <div class="event-grid">

    <p *ngIf="events.length === 0" class="empty">
      No events found.
    </p>

    <div class="event-card" *ngFor="let e of events">

      <!-- FREE BADGE -->
      <div class="free-badge" *ngIf="e.registrationFee === 0">
        FREE
      </div>

      <!-- IMAGE -->
      <div class="event-img-wrapper">
        <img
          [src]="'http://localhost:5000' + e.eventImage"
          alt="Event Image"
        />
      </div>

      <!-- INFO -->
      <div class="event-info">
        <h3>{{ e.title }}</h3>
        <p>Category : {{ e.category }}</p>
        <p>Date : {{ e.date | date }}</p>
        <p>Venue : {{ e.venue }}</p>
      </div>

      <!-- ACTIONS -->
      <div class="event-actions">

        <a [routerLink]="['/student/event-details', e._id]">
          View Details |
        </a>

        <a
          href="javascript:void(0)"
          (click)="
            (!getRegistration(e._id) || getRegistration(e._id)?.status === 'rejected')
            && registerEvent(e._id)
          "
        >

          <!-- 🔥 STATUS LOGIC -->

          <ng-container *ngIf="getRegistration(e._id) as reg; else notReg">

            <span *ngIf="reg.status === 'approved'">
              ✅ Registered
            </span>

            <span *ngIf="reg.status === 'pending'">
              ⏳ Pending
            </span>

            <span *ngIf="reg.status === 'rejected'">
              🔁 Register Again
            </span>

          </ng-container>

          <ng-template #notReg>
            Register
          </ng-template>

        </a>

      </div>

    </div>

  </div>

</div>
