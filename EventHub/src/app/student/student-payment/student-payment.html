<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<div class="payment-container">

  <h2>Secure Payment</h2>
  <p class="sub">Complete your registration</p>

  <!-- ================= LOADING ================= -->

  <div *ngIf="loading" class="loading-box">
    Loading payment details...
  </div>


  <!-- ================= UPI PAYMENT ================= -->

  <div class="payment-box" *ngIf="method === 'upi' && !loading">

    <h3>UPI Payment</h3>

    <div class="qr-box">

      <!-- QR CODE -->
      <img [src]="qrCode" alt="UPI QR">

      <p class="scan-text">
        Scan using Google Pay / PhonePe / Paytm
      </p>

      <div class="amount-box">
        <span>Amount</span>
        <h4>₹{{amount}}</h4>
      </div>

      <p class="upi-id">
        UPI ID: <strong>dixita3286@okicici</strong>
      </p>

      <p class="instruction">
        After completing payment click the button below
      </p>

    </div>

    <button class="pay-btn" (click)="payNow()">
      I Have Paid ₹{{amount}}
    </button>

  </div>


  <!-- ================= CARD PAYMENT ================= -->

  <div class="payment-box" *ngIf="method === 'card' && !loading">

    <h3>Card Payment</h3>

    <input
      type="text"
      maxlength="16"
      placeholder="Card Number"
      [(ngModel)]="cardNumber"
    >

    <div class="row">

      <input
        type="text"
        placeholder="MM/YY"
        [(ngModel)]="expiry"
      >

      <input
        type="password"
        maxlength="3"
        placeholder="CVV"
        [(ngModel)]="cvv"
      >

    </div>

    <button class="pay-btn" (click)="payNow()">
      Pay ₹{{amount}}
    </button>

  </div>


  <!-- CANCEL BUTTON -->

  <button class="cancel-btn" (click)="cancelPayment()" *ngIf="!loading">
    Cancel
  </button>

</div>
