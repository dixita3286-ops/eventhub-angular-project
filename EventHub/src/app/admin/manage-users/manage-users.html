<section class="page">

  <!-- HEADER -->
  <div class="top-bar">
    <div class="title-wrapper">
      <h1>Manage Users</h1>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="control-bar">

    <input
      type="text"
      class="search-box"
      placeholder="Search users..."
      [(ngModel)]="searchText"
    />

    <select
      class="role-select"
      [(ngModel)]="roleFilter">

      <option value="all">All</option>
      <option value="user">Students</option>
      <option value="organizer">Organizers</option>

    </select>

  </div>

  <!-- EMPTY -->
  <p *ngIf="filteredUsers.length === 0" class="empty">
    No users found.
  </p>

  <!-- USERS -->
  <div class="user-grid">

    <div class="user-card" *ngFor="let u of filteredUsers">

      <div class="avatar">
        {{ u.name?.charAt(0) | uppercase }}
      </div>

      <div class="info">
        <h3>{{ u.name }}</h3>
        <p>{{ u.email }}</p>

        <span class="role">
          {{ u.role | uppercase }}
        </span>

        <!-- 🔥 CENTER DELETE BUTTON -->
        <div class="actions">
          <button class="delete-btn" (click)="deleteUser(u._id)">
            Delete User
          </button>
        </div>

      </div>

    </div>

  </div>

</section>
