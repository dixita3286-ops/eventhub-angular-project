<section class="page">

  <h1>Manage Payments</h1>

  <!-- LOADING -->
  <p *ngIf="loading">Loading payments...</p>

  <!-- GRID -->
  <div class="student-grid">

    <div 
      class="student-card"
      *ngFor="let p of payments"
      [ngClass]="p.animate"
    >

      <!-- NAME -->
      <h3>
        {{ p.userId?.name }}

        <span *ngIf="p.status==='approved'" class="badge verified">
          ✔ Verified
        </span>
      </h3>

      <p>{{ p.userId?.email }}</p>
      <p>{{ p.eventId?.title }}</p>

      <!-- STATUS -->
      <p>
        Status:
        <span [ngClass]="p.status">{{ p.status }}</span>
      </p>

      <!-- ✅ VIEW BUTTON ONLY FOR PENDING -->
      <button 
        *ngIf="p.paymentProof && p.status === 'pending'"
        class="view-btn"
        (click)="openImage(p)"
      >
        View Payment Proof
      </button>

      <!-- REJECT REASON -->
      <p *ngIf="p.rejectReason" class="reject-reason">
        {{ p.rejectReason }}
      </p>

    </div>

  </div>

  <!-- EMPTY STATE -->
  <p *ngIf="!loading && payments.length === 0">
    No payment records found.
  </p>

  <!-- MODAL -->
  <div class="modal" *ngIf="selectedPayment" (click)="closeImage()">

    <span class="close-fixed" (click)="closeImage()">✖</span>

    <div class="modal-content" (click)="$event.stopPropagation()">

      <!-- IMAGE -->
      <img 
        [src]="selectedImage"
        class="modal-img"
        (dblclick)="toggleZoom()"
        (mousedown)="startDrag($event)"
      >

      <!-- ACTION BUTTONS -->
      <div class="modal-actions" *ngIf="selectedPayment.status === 'pending'">

        <button (click)="approve(selectedPayment._id)">
          Approve
        </button>

        <button class="reject-btn" (click)="rejectWithReason(selectedPayment._id)">
          Reject
        </button>

      </div>

    </div>

  </div>

</section>
